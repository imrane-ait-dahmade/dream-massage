name: Fly - Deploy

# Deploys the dream-massage backend to Fly.io on every push to main.
# fly.toml already runs `npx prisma migrate deploy` as its release_command, so this
# workflow does NOT run migrations itself — flyctl triggers that automatically as
# part of the deploy.
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: fly-deploy-dream-massage
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
